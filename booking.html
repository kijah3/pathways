<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment | AfroStyle Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#FAF4EC;padding-top:90px;}
.navbar{position:fixed;top:0;width:100%;padding:20px 10%;display:flex;justify-content:space-between;align-items:center;background:rgba(44,27,24,0.6);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.1);z-index:1000;}
.logo{font-family:'Playfair Display', serif;font-size:22px;color:white;}
.navbar a{color:white;text-decoration:none;margin-left:25px;}
.container{padding:60px 10%;}
.summary{display:flex;gap:20px;background:white;padding:20px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.05);margin-bottom:40px;}
.summary img{width:120px;height:120px;border-radius:15px;object-fit:cover;}
.summary h2{font-family:'Playfair Display', serif;}
.form-section{background:white;padding:30px;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.05);margin-bottom:30px;}
.form-section h3{margin-bottom:20px;font-family:'Playfair Display', serif;}
select,input{width:100%;padding:12px;margin-bottom:15px;border-radius:10px;border:1px solid #ddd;font-size:14px;}
.time-slots{display:flex;gap:10px;flex-wrap:wrap;}
.time-slot{padding:10px 20px;border-radius:20px;background:#F5E6D3;cursor:pointer;transition:0.3s;}
.time-slot:hover{background:#C6A75E;color:white;}
.time-slot.active{background:#2C1B18;color:white;}
.confirm-btn{width:100%;padding:15px;background:#C6A75E;border:none;border-radius:30px;font-weight:bold;cursor:pointer;font-size:16px;transition:0.3s;}
.confirm-btn:hover{background:#b8954f;}
@media(max-width:900px){.summary{flex-direction:column;text-align:center;}}
</style>
</head>
<body>

<header class="navbar">
    <div class="logo">AfroStyle Connect</div>
    <a href="profile.html">← Back to Profile</a>
</header>

<div class="container">

    <!-- Stylist Summary -->
    <div class="summary">
        <img src="https://images.unsplash.com/photo-1594737625785-a6cbdabd333c">
        <div>
            <h2>Queen Braids Studio</h2>
            <p>Lusaka, Zambia</p>
            <p>★★★★★ (4.8)</p>
        </div>
    </div>

    <!-- Service Selection -->
    <div class="form-section">
        <h3>Select Service</h3>
        <select>
            <option>Knotless Braids - K250</option>
            <option>Ghana Weaving - K200</option>
            <option>Dreadlock Retwist - K180</option>
        </select>
    </div>

    <!-- Date Selection -->
    <div class="form-section">
        <h3>Select Date</h3>
        <input type="date">
    </div>

    <!-- Time Selection -->
    <div class="form-section">
        <h3>Select Time</h3>
        <div class="time-slots">
            <div class="time-slot">09:00</div>
            <div class="time-slot">10:00</div>
            <div class="time-slot">11:00</div>
            <div class="time-slot">13:00</div>
            <div class="time-slot">14:00</div>
            <div class="time-slot">15:00</div>
        </div>
    </div>

    <!-- Customer Details -->
    <div class="form-section">
        <h3>Your Details</h3>
        <input type="text" placeholder="Full Name">
        <input type="tel" placeholder="Phone Number">
        <input type="email" placeholder="Email Address">
    </div>

    <button class="confirm-btn">Confirm Booking</button>

</div>

<script>
// Time slot selection
const slots = document.querySelectorAll('.time-slot');
slots.forEach(slot => {
    slot.addEventListener('click', () => {
        slots.forEach(s => s.classList.remove('active'));
        slot.classList.add('active');
    });
});
</script>

</body>
</html>
